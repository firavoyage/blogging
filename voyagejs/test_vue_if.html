<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpine.js x-if Example</title>
    <script src="vue1.0.0.js"></script>
  </head>
  <body>
    <div id="app">
      <p v-if="showMessage">This is a conditional message.</p>
      <button @click="toggleMessage">Toggle Message</button>
    </div>
  </body>
  <script>
    new Vue({
      el: "#app",
      data: {
        showMessage: true,
      },
      methods: {
        toggleMessage() {
          this.showMessage = !this.showMessage;
        },
      },
    });
  </script>
</html>
