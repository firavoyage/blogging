
<div id="app">
  <p>abc</p>
  <p>abc</p>
  <p>abc</p>
  <p v-if="showMessage">This is a conditional message.</p>
  <p>xyz</p>
  <p>abc</p>
  <p>abc</p>
  <button @click="toggleMessage">Toggle Message</button>
</div>
<script src="vue1.0.0.js"></script>
<script>
new Vue({
  el: '#app',
  data: {
    showMessage: true
  },
  methods: {
    toggleMessage() {
      this.showMessage = !this.showMessage;
    }
  }
});
</script>
