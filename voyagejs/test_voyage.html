<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>welcome to hotel california</title>
    <style>
      * {
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
      }

      body {
        line-height: 1.75em;
        font-size: 16px;
        background-color: #222;
        color: #aaa;
      }

      .simple-container {
        max-width: 675px;
        margin: 0 auto;
        padding-top: 70px;
        padding-bottom: 20px;
      }

      .simple-print {
        fill: white;
        stroke: white;
      }
      .simple-print svg {
        height: 100%;
      }

      .simple-close {
        color: white;
        border-color: white;
      }

      .simple-ext-info {
        border-top: 1px solid #aaa;
      }

      p {
        font-size: 16px;
      }

      h1 {
        font-size: 30px;
        line-height: 34px;
      }

      h2 {
        font-size: 20px;
        line-height: 25px;
      }

      h3 {
        font-size: 16px;
        line-height: 27px;
        padding-top: 15px;
        padding-bottom: 15px;
        border-bottom: 1px solid #d8d8d8;
        border-top: 1px solid #d8d8d8;
      }

      hr {
        height: 1px;
        background-color: #d8d8d8;
        border: none;
        width: 100%;
        margin: 0px;
      }

      a[href] {
        color: #1e8ad6;
      }

      a[href]:hover {
        color: #3ba0e6;
      }

      img {
        max-width: 100%;
      }

      li {
        line-height: 1.5em;
      }

      aside,
      [class*="sidebar"],
      [id*="sidebar"] {
        max-width: 90%;
        margin: 0 auto;
        border: 1px solid lightgrey;
        padding: 5px 15px;
      }

      @media (min-width: 1921px) {
        body {
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body></body>

  <script type="text/javascript" src="voyage.js"></script>
</html>
